<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio Provisioning Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- QR Code Library -->
    <script src="https://unpkg.com/qrcode.react@4.0.0/dist/qrcode.react.min.js"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen p-6 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { QRCodeSVG } = window.QRCode;

        function App() {
            const [bingeCatUrl, setBingeCatUrl] = useState('');
            const [isUrlValid, setIsUrlValid] = useState(true);

            // 1. Persistence: Load from LocalStorage
            useEffect(() => {
                const savedUrl = localStorage.getItem('nuvio_binge_url');
                if (savedUrl) setBingeCatUrl(savedUrl);
            }, []);

            // 2. Validation: Check URL format
            useEffect(() => {
                const isValid = bingeCatUrl === '' || bingeCatUrl.startsWith('http');
                setIsUrlValid(isValid);
                if (isValid && bingeCatUrl !== '') localStorage.setItem('nuvio_binge_url', bingeCatUrl);
            }, [bingeCatUrl]);

            const generateConfig = (type) => ({
                schema_version: "1.0.0",
                generated_at: new Date().toISOString(),
                preset_type: type,
                bingecat_url: bingeCatUrl,
                scrapers: ["torrentio", "comet"],
                options: {
                    cached_only: true,
                    max_results: type === 'mobile' ? 3 : 15,
                    resolution_filter: type === 'mobile' ? "1080p_or_less" : undefined,
                    name_template: "[{stream.resolution}] • {stream.type::=debrid[\"☁️ Debrid\"||\"🌐 P2P\"]} • {service.cached::istrue[\"⚡ Cached\"||\"⚪ Uncached\"]} • {addon.name}",
                    description_template: "🎥 {stream.quality} • 📦 {stream.size::rbytes} • 🗓️ {stream.year}"
                }
            });

            const downloadPreset = (type) => {
                const config = generateConfig(type);
                const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `nuvio-${type}-config.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="max-w-md mx-auto space-y-6">
                    <div className="text-center pb-2 border-b border-neutral-800">
                        <h1 className="text-xl font-black text-white uppercase tracking-tight">Nuvio Panel</h1>
                    </div>

                    {/* Instructions */}
                    <div className="bg-neutral-900 border border-neutral-800 p-4 rounded-xl text-[11px] text-neutral-400 space-y-2">
                        <ol className="list-decimal ml-4 space-y-1">
                            <li>Set your Binge Cat URL.</li>
                            <li>Download the preset that matches your device.</li>
                            <li>Import the JSON into <a href="https://aiostreams.elfhosted.com/stremio/configure" target="_blank" className="text-emerald-400 underline">AIOStreams</a>.</li>
                        </ol>
                    </div>

                    {/* Binge Cat Input */}
                    <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800">
                        <label className="text-[10px] font-bold uppercase text-neutral-500 mb-2 block">Binge Cat URL</label>
                        <input 
                            type="text" 
                            value={bingeCatUrl} 
                            onChange={(e) => setBingeCatUrl(e.target.value)} 
                            className={`w-full bg-neutral-950 border rounded-lg p-3 text-xs text-white ${isUrlValid ? 'border-neutral-800' : 'border-red-500'}`}
                            placeholder="https://bingecat.com/stremio/..." 
                        />
                    </div>

                    {/* Presets & QR */}
                    <div className="grid grid-cols-2 gap-3">
                        <button disabled={!isUrlValid} onClick={() => downloadPreset('mobile')} className="bg-indigo-900 hover:bg-indigo-800 disabled:opacity-50 text-white font-bold py-3 rounded-xl text-[10px]">Mobile Config</button>
                        <button disabled={!isUrlValid} onClick={() => downloadPreset('quality')} className="bg-emerald-900 hover:bg-emerald-800 disabled:opacity-50 text-white font-bold py-3 rounded-xl text-[10px]">High-Qual Config</button>
                    </div>

                    {/* QR Preview (Shows for Quality Config by default) */}
                    {isUrlValid && bingeCatUrl && (
                        <div className="flex justify-center bg-neutral-900 p-4 rounded-xl border border-neutral-800">
                            <QRCodeSVG value={JSON.stringify(generateConfig('quality'))} size={128} bgColor="#0a0a0a" fgColor="#ffffff" />
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
