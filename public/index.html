<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio Provisioning Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const AVAILABLE_SCRAPERS = [
            { id: 'torrentio', name: 'Torrentio (Public Catalogs)' },
            { id: 'comet', name: 'Comet (High-Speed Scraper)' },
            { id: 'knightcrawler', name: 'KnightCrawler (P2P Index)' },
            { id: 'mediafusion', name: 'MediaFusion (Alternative Links)' }
        ];

        function App() {
          const [bcInput, setBcInput] = useState('');
          const [engineType, setEngineType] = useState('public'); 
          const [customBaseUrl, setCustomBaseUrl] = useState('https://your-selfhosted-domain.com');
          const [selectedScrapers, setSelectedScrapers] = useState(['torrentio', 'comet']);
          const [isMobile, setIsMobile] = useState(false);
          const [loading, setLoading] = useState(false);
          const [results, setResults] = useState(null);
          const [copiedField, setCopiedField] = useState(null);

          const toggleScraper = (id) => {
            setSelectedScrapers(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
          };

          const copyToClipboard = (text, fieldName) => {
            navigator.clipboard.writeText(text);
            setCopiedField(fieldName);
            setTimeout(() => setCopiedField(null), 2000);
          };

          const handleFormSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            
            try {
                const response = await fetch('/api/compile-deployment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bingecatInput: bcInput,
                        scrapers: selectedScrapers,
                        engineType,
                        customBaseUrl,
                        isMobile
                    })
                });
                const data = await response.json();
                if (data.success) setResults(data);
            } catch (err) {
                alert("Compilation failed: " + err.message);
            } finally {
                setLoading(false);
            }
          };

          return (
            <div className="min-h-screen py-8 px-4 max-w-3xl mx-auto flex flex-col justify-between">
              <div>
                <div className="border-b border-neutral-800 pb-5 mb-6">
                  <h1 className="text-xl font-extrabold text-white">Nuvio Automatic Setup Engine</h1>
                  <p className="text-xs text-neutral-400 mt-1">Configure your deployment rules seamlessly on a single page</p>
                </div>

                <form onSubmit={handleFormSubmit} className="space-y-4">
                  <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800">
                    <label className="text-xs font-bold uppercase tracking-wider text-neutral-400 block mb-2">1. Paste BingeCat Content String</label>
                    <input 
                      type="text" required value={bcInput} onChange={(e) => setBcInput(e.target.value)}
                      placeholder="Paste manifest link or raw UUID..." 
                      className="w-full bg-neutral-950 border border-neutral-800 rounded-lg p-2.5 text-xs text-white font-mono focus:outline-none focus:border-indigo-500"
                    />
                  </div>

                  <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800 space-y-3">
                    <div className="flex justify-between items-center">
                      <label className="text-xs font-bold uppercase tracking-wider text-neutral-400">2. Active Scraper Matrix</label>
                      <div className="flex bg-neutral-950 p-0.5 rounded-lg border border-neutral-800">
                        <button type="button" onClick={() => setEngineType('public')} className={`px-2 py-0.5 text-xs rounded transition ${engineType === 'public' ? 'bg-indigo-600 text-white' : 'text-neutral-400'}`}>Public Hub</button>
                        <button type="button" onClick={() => setEngineType('selfhosted')} className={`px-2 py-0.5 text-xs rounded transition ${engineType === 'selfhosted' ? 'bg-indigo-600 text-white' : 'text-neutral-400'}`}>Self-Hosted</button>
                      </div>
                    </div>

                    {engineType === 'selfhosted' && (
                      <input 
                        type="url" required value={customBaseUrl} onChange={(e) => setCustomBaseUrl(e.target.value)}
                        className="w-full bg-neutral-950 border border-neutral-800 rounded-lg p-2 text-xs text-white font-mono"
                      />
                    )}

                    <div className="grid grid-cols-1 gap-2 pt-1">
                      {AVAILABLE_SCRAPERS.map(s => (
                        <div 
                          key={s.id} onClick={() => toggleScraper(s.id)}
                          className={`p-2.5 rounded-lg border cursor-pointer select-none transition text-xs flex justify-between items-center ${selectedScrapers.includes(s.id) ? 'bg-indigo-950/40 border-indigo-500/50 text-white' : 'bg-neutral-950 border-neutral-800 text-neutral-400'}`}
                        >
                          <span>{s.name}</span>
                          <span className={`w-1.5 h-1.5 rounded-full ${selectedScrapers.includes(s.id) ? 'bg-indigo-400' : 'bg-transparent'}`}></span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="flex items-center justify-between bg-neutral-900 p-4 rounded-xl border border-neutral-800">
                    <span className="text-xs font-bold uppercase tracking-wider text-neutral-400">3. Mobile Frame Optimization</span>
                    <input type="checkbox" checked={isMobile} onChange={(e) => setIsMobile(e.target.checked)} className="w-4 h-4 accent-indigo-500" />
                  </div>

                  <button type="submit" disabled={loading} className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-neutral-800 text-white font-semibold py-3 px-4 rounded-xl transition text-xs">
                    {loading ? 'Registering Configuration Paths...' : 'Generate Setup Outputs'}
                  </button>
                </form>

                {results && (
                  <div className="mt-6 bg-neutral-900 border border-neutral-800 rounded-xl p-4 space-y-3">
                    <h3 className="text-xs font-bold text-emerald-400">✓ Pack Compiled Successfully</h3>
                    
                    <div>
                      <label className="text-[10px] text-neutral-400 block mb-1">Manifest 1: Media Catalog Interface (BingeCat)</label>
                      <div className="flex bg-neutral-950 border border-neutral-800 rounded-lg p-1">
                        <input readOnly value={results.bingecatManifest} className="bg-transparent text-xs p-1 flex-grow focus:outline-none font-mono text-neutral-400 truncate" />
                        <button onClick={() => copyToClipboard(results.bingecatManifest, 'bc')} className="bg-neutral-800 text-xs px-2.5 py-1 rounded text-white">{copiedField === 'bc' ? 'Copied' : 'Copy'}</button>
                      </div>
                    </div>

                    <div>
                      <label className="text-[10px] text-neutral-400 block mb-1">Manifest 2: Scraper Array (AIOStreams)</label>
                      <div className="flex bg-neutral-950 border border-neutral-800 rounded-lg p-1">
                        <input readOnly value={results.aiostreamsManifest} className="bg-transparent text-xs p-1 flex-grow focus:outline-none font-mono text-neutral-400 truncate" />
                        <button onClick={() => copyToClipboard(results.aiostreamsManifest, 'aio')} className="bg-neutral-800 text-xs px-2.5 py-1 rounded text-white">{copiedField === 'aio' ? 'Copied' : 'Copy'}</button>
                      </div>
                    </div>

                    <div className="bg-neutral-950 border border-neutral-800 rounded-lg p-3 space-y-2 text-[10px]">
                      <div>
                        <span className="text-neutral-500 block mb-0.5">Stream Display Name Template:</span>
                        <div className="flex bg-neutral-900 border border-neutral-800 rounded p-1 items-center justify-between">
                          <code className="p-1 text-neutral-400 truncate font-mono">{results.nameTemplate}</code>
                          <button onClick={() => copyToClipboard(results.nameTemplate, 'n')} className="bg-neutral-800 text-white px-2 py-0.5 rounded">{copiedField === 'n' ? 'Saved' : 'Copy'}</button>
                        </div>
                      </div>
                      <div>
                        <span className="text-neutral-500 block mb-0.5">Stream Subtitle Template:</span>
                        <div className="flex bg-neutral-900 border border-neutral-800 rounded p-1 items-center justify-between">
                          <code className="p-1 text-neutral-400 truncate font-mono">{results.descriptionTemplate}</code>
                          <button onClick={() => copyToClipboard(results.descriptionTemplate, 'd')} className="bg-neutral-800 text-white px-2 py-0.5 rounded">{copiedField === 'd' ? 'Saved' : 'Copy'}</button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
