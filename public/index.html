<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio Provisioning Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const AVAILABLE_SCRAPERS = [
            { id: 'torrentio', name: 'Torrentio (Public Catalogs)' },
            { id: 'comet', name: 'Comet (High-Speed Scraper)' },
            { id: 'knightcrawler', name: 'KnightCrawler (P2P Index)' },
            { id: 'mediafusion', name: 'MediaFusion (Alternative Links)' }
        ];

        const QUALITY_OPTIONS = [
            { id: 'all', name: 'All Qualities', desc: 'No filters applied' },
            { id: '1080p_or_less', name: 'Max 1080p', desc: 'Best for mobile frames / data' },
            { id: '720p_or_less', name: 'Max 720p', desc: 'Saves maximum bandwidth' },
            { id: '4k_only', name: 'Strict 4K UHD', desc: 'Premium displays only' }
        ];

        function App() {
          const [bcInput, setBcInput] = useState('');
          const [engineType, setEngineType] = useState('public'); 
          const [customBaseUrl, setCustomBaseUrl] = useState('https://your-selfhosted-domain.com');
          const [selectedScrapers, setSelectedScrapers] = useState(['torrentio', 'comet']);
          const [maxQuality, setMaxQuality] = useState('all');
          const [isMobile, setIsMobile] = useState(false);
          const [loading, setLoading] = useState(false);
          const [results, setResults] = useState(null);
          const [copiedField, setCopiedField] = useState(null);

          const toggleScraper = (id) => {
            setSelectedScrapers(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
          };

          const copyToClipboard = (text, fieldName) => {
            navigator.clipboard.writeText(text);
            setCopiedField(fieldName);
            setTimeout(() => setCopiedField(null), 2000);
          };

          const handleFormSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            
            try {
                const response = await fetch('/api/compile-deployment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bingecatInput: bcInput,
                        scrapers: selectedScrapers,
                        engineType,
                        customBaseUrl,
                        maxQuality,
                        isMobile
                    })
                });
                const data = await response.json();
                if (data.success) setResults(data);
            } catch (err) {
                alert("Compilation failed: " + err.message);
            } finally {
                setLoading(false);
            }
          };

          return (
            <div className="min-h-screen py-6 px-4 max-w-xl mx-auto flex flex-col justify-between">
              <div>
                <div className="border-b border-neutral-800 pb-4 mb-5">
                  <h1 className="text-lg font-black text-white tracking-tight">Nuvio Deployment Wizard</h1>
                  <p className="text-[11px] text-neutral-400 mt-0.5">Mobile-optimized touch workspace</p>
                </div>

                <form onSubmit={handleFormSubmit} className="space-y-4">
                  {/* Step 1 */}
                  <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800">
                    <label className="text-[10px] font-bold uppercase tracking-wider text-neutral-400 block mb-2">1. BingeCat Content Link / ID</label>
                    <input 
                      type="text" required value={bcInput} onChange={(e) => setBcInput(e.target.value)}
                      placeholder="Paste target string here..." 
                      className="w-full bg-neutral-950 border border-neutral-800 rounded-lg p-3 text-xs text-white font-mono focus:outline-none focus:border-indigo-500"
                    />
                  </div>

                  {/* Step 2 */}
                  <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800 space-y-3">
                    <div className="flex justify-between items-center">
                      <label className="text-[10px] font-bold uppercase tracking-wider text-neutral-400">2. Select Active Scrapers</label>
                      <div className="flex bg-neutral-950 p-1 rounded-lg border border-neutral-800 text-[10px]">
                        <button type="button" onClick={() => setEngineType('public')} className={`px-2.5 py-1 font-medium rounded-md transition ${engineType === 'public' ? 'bg-indigo-600 text-white' : 'text-neutral-400'}`}>Public</button>
                        <button type="button" onClick={() => setEngineType('selfhosted')} className={`px-2.5 py-1 font-medium rounded-md transition ${engineType === 'selfhosted' ? 'bg-indigo-600 text-white' : 'text-neutral-400'}`}>Self-Hosted</button>
                      </div>
                    </div>

                    {engineType === 'selfhosted' && (
                      <input 
                        type="url" required value={customBaseUrl} onChange={(e) => setCustomBaseUrl(e.target.value)}
                        className="w-full bg-neutral-950 border border-neutral-800 rounded-lg p-2.5 text-xs text-white font-mono"
                      />
                    )}

                    <div className="grid grid-cols-1 gap-2 pt-1">
                      {AVAILABLE_SCRAPERS.map(s => (
                        <div 
                          key={s.id} onClick={() => toggleScraper(s.id)}
                          className={`p-3 rounded-xl border cursor-pointer select-none transition text-xs flex justify-between items-center min-h-[44px] ${selectedScrapers.includes(s.id) ? 'bg-indigo-950/30 border-indigo-500 text-white font-semibold' : 'bg-neutral-950 border-neutral-800 text-neutral-400'}`}
                        >
                          <span>{s.name}</span>
                          <div className={`w-4 h-4 rounded-full border flex items-center justify-center ${selectedScrapers.includes(s.id) ? 'border-indigo-500 bg-indigo-600' : 'border-neutral-700 bg-neutral-950'}`}>
                            {selectedScrapers.includes(s.id) && <span className="text-[9px] text-white">✓</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Step 3: Mobile Friendly Thumb Cards for Quality */}
                  <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800 space-y-2">
                    <label className="text-[10px] font-bold uppercase tracking-wider text-neutral-400 block">3. Streaming Quality Limit</label>
                    <div className="grid grid-cols-1 gap-2">
                      {QUALITY_OPTIONS.map(opt => (
                        <div
                          key={opt.id} onClick={() => setMaxQuality(opt.id)}
                          className={`p-3 rounded-xl border cursor-pointer select-none transition flex flex-col justify-center min-h-[54px] ${maxQuality === opt.id ? 'bg-indigo-950/30 border-indigo-500 text-white font-semibold' : 'bg-neutral-950 border-neutral-800 text-neutral-400'}`}
                        >
                          <div className="text-xs flex justify-between items-center">
                            <span>{opt.name}</span>
                            <div className={`w-4 h-4 rounded-full border flex items-center justify-center ${maxQuality === opt.id ? 'border-indigo-500 bg-indigo-600' : 'border-neutral-700 bg-neutral-950'}`}>
                              {maxQuality === opt.id && <div className="w-1.5 h-1.5 rounded-full bg-white"></div>}
                            </div>
                          </div>
                          <span className="text-[10px] text-neutral-500 font-normal mt-0.5">{opt.desc}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Step 4 */}
                  <div onClick={() => setIsMobile(!isMobile)} className="flex items-center justify-between bg-neutral-900 p-4 rounded-xl border border-neutral-800 cursor-pointer min-h-[48px] select-none">
                    <div className="flex flex-col">
                      <span className="text-[10px] font-bold uppercase tracking-wider text-neutral-400">4. Mobile Optimization</span>
                      <span className="text-[10px] text-neutral-500">Injects custom badges for small player screens</span>
                    </div>
                    <input type="checkbox" checked={isMobile} readOnly className="w-4 h-4 accent-indigo-500" />
                  </div>

                  <button type="submit" disabled={loading} className="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 disabled:bg-neutral-800 text-white font-bold py-3.5 px-4 rounded-xl transition text-xs shadow-lg min-h-[48px]">
                    {loading ? 'Compiling Manifest Assets...' : 'Generate Optimized Outputs'}
                  </button>
                </form>

                {results && (
                  <div className="mt-5 bg-neutral-900 border border-neutral-800 rounded-xl p-4 space-y-3">
                    <h3 className="text-xs font-bold text-emerald-400">✓ Package Configured</h3>
                    
                    <div>
                      <label className="text-[9px] text-neutral-400 block mb-1">Catalog Path (BingeCat)</label>
                      <div className="flex bg-neutral-950 border border-neutral-800 rounded-lg p-1.5 items-center">
                        <input readOnly value={results.bingecatManifest} className="bg-transparent text-xs px-1 flex-grow focus:outline-none font-mono text-neutral-400 truncate" />
                        <button onClick={() => copyToClipboard(results.bingecatManifest, 'bc')} className="bg-indigo-600 active:bg-indigo-700 font-semibold text-[11px] px-3 py-1.5 rounded-md text-white min-h-[32px]">{copiedField === 'bc' ? 'Copied' : 'Copy'}</button>
                      </div>
                    </div>

                    <div>
                      <label className="text-[9px] text-neutral-400 block mb-1">Scraper Array Path (AIOStreams)</label>
                      <div className="flex bg-neutral-950 border border-neutral-800 rounded-lg p-1.5 items-center">
                        <input readOnly value={results.aiostreamsManifest} className="bg-transparent text-xs px-1 flex-grow focus:outline-none font-mono text-neutral-400 truncate" />
                        <button onClick={() => copyToClipboard(results.aiostreamsManifest, 'aio')} className="bg-indigo-600 active:bg-indigo-700 font-semibold text-[11px] px-3 py-1.5 rounded-md text-white min-h-[32px]">{copiedField === 'aio' ? 'Copied' : 'Copy'}</button>
                      </div>
                    </div>

                    <div className="bg-neutral-950 border border-neutral-800 rounded-xl p-3 space-y-2.5 text-[10px]">
                      <div>
                        <span className="text-neutral-500 block mb-1">Display Title Template:</span>
                        <div className="flex bg-neutral-900 border border-neutral-800 rounded-lg p-1.5 items-center justify-between">
                          <code className="px-1 text-neutral-400 truncate font-mono">{results.nameTemplate}</code>
                          <button onClick={() => copyToClipboard(results.nameTemplate, 'n')} className="bg-neutral-800 text-white font-medium px-2 py-1 rounded-md">{copiedField === 'n' ? 'Saved' : 'Copy'}</button>
                        </div>
                      </div>
                      <div>
                        <span className="text-neutral-500 block mb-1">Subtitle Template:</span>
                        <div className="flex bg-neutral-900 border border-neutral-800 rounded-lg p-1.5 items-center justify-between">
                          <code className="px-1 text-neutral-400 truncate font-mono">{results.descriptionTemplate}</code>
                          <button onClick={() => copyToClipboard(results.descriptionTemplate, 'd')} className="bg-neutral-800 text-white font-medium px-2 py-1 rounded-md">{copiedField === 'd' ? 'Saved' : 'Copy'}</button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
