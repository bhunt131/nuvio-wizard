<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio Provisioning Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen p-6 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [bingeCatUrl, setBingeCatUrl] = useState(localStorage.getItem('nuvio_binge_url') || '');

            const generateConfig = (type) => JSON.stringify({
                metadata: {
                    id: `nuvio-${type}-config`,
                    name: `Nuvio ${type.charAt(0).toUpperCase() + type.slice(1)} Preset`,
                    description: "Optimized Scraper & Filter settings",
                    author: "Nuvio"
                },
                config: {
                    bingecat_url: bingeCatUrl,
                    scrapers: ["torrentio", "comet", "knightcrawler", "mediafusion"],
                    options: {
                        cached_only: true,
                        max_results: type === 'mobile' ? 3 : 15,
                        resolution_filter: type === 'mobile' ? "1080p_or_less" : undefined,
                        name_template: "[{stream.resolution}] • {stream.type::=debrid[\"☁️ Debrid\"||\"🌐 P2P\"]} • {service.cached::istrue[\"⚡ Cached\"||\"⚪ Uncached\"]} • {addon.name}",
                        description_template: "🎥 {stream.quality} • 📦 {stream.size::rbytes} • 🗓️ {stream.year}"
                    }
                }
            }, null, 2);

            const download = (type) => {
                localStorage.setItem('nuvio_binge_url', bingeCatUrl);
                const blob = new Blob([generateConfig(type)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `nuvio-${type}-template.json`;
                a.click();
            };

            return (
                <div className="max-w-md mx-auto space-y-6">
                    <div className="text-center pb-2 border-b border-neutral-800">
                        <h1 className="text-xl font-black text-white uppercase tracking-tight">Nuvio Panel</h1>
                    </div>

                    <div className="bg-neutral-900 border border-neutral-800 p-5 rounded-xl text-[12px] text-neutral-400 space-y-2">
                        <p className="font-bold text-white uppercase">Setup Instructions:</p>
                        <ol className="list-decimal ml-4 space-y-1">
                            <li>Set your Binge Cat URL below.</li>
                            <li>Download the preset.</li>
                            <li>Go to <a href="https://aiostreams.elfhosted.com/stremio/configure" target="_blank" className="text-emerald-400 underline">AIOStreams</a>.</li>
                            <li>Select <b>Import</b> and upload the downloaded file.</li>
                        </ol>
                    </div>

                    <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800">
                        <label className="text-[10px] font-bold uppercase text-neutral-500 mb-2 block">Binge Cat URL</label>
                        <input type="text" value={bingeCatUrl} onChange={(e) => setBingeCatUrl(e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 rounded-lg p-3 text-xs text-white" />
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                        <button onClick={() => download('mobile')} className="bg-indigo-900 hover:bg-indigo-800 text-white font-bold py-4 rounded-xl text-[10px]">Download Mobile</button>
                        <button onClick={() => download('quality')} className="bg-emerald-900 hover:bg-emerald-800 text-white font-bold py-4 rounded-xl text-[10px]">Download High-Qual</button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
