<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio Provisioning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
          const [selectedScrapers, setSelectedScrapers] = useState(['torrentio', 'comet']);
          const [maxQuality, setMaxQuality] = useState('all');
          const [bingeCatUrl, setBingeCatUrl] = useState('');
          const [copyStatus, setCopyStatus] = useState('Copy JSON');

          const generateConfig = () => ({
            scrapers: selectedScrapers,
            bingecat_url: bingeCatUrl,
            options: {
                cached_only: true,
                max_results: 5,
                resolution_filter: maxQuality !== 'all' ? maxQuality : undefined,
                name_template: `[{stream.resolution}] • {stream.type::=debrid["☁️ Debrid"||"🌐 P2P"]} • {service.cached::istrue["⚡ Cached"||"⚪ Uncached"]} • {addon.name}`,
                description_template: `🎥 {stream.quality} • 📦 {stream.size::rbytes} • 🗓️ {stream.year} • {stream.visualTags::join(' ')}`
            }
          });

          // Optimized for Mobile Download
          const downloadJson = () => {
            const data = JSON.stringify(generateConfig(), null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `nuvio-master-config.json`;
            document.body.appendChild(a);
            a.click(); // Triggers the browser download prompt immediately
            
            // Cleanup
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
          };

          const copyToClipboard = () => {
            navigator.clipboard.writeText(JSON.stringify(generateConfig(), null, 2));
            setCopyStatus('Copied!');
            setTimeout(() => setCopyStatus('Copy JSON'), 2000);
          };

          return (
            <div className="min-h-screen py-8 px-4 max-w-lg mx-auto space-y-6">
              <div className="border-b border-neutral-800 pb-4">
                <h1 className="text-xl font-black text-white">Nuvio Provisioning</h1>
                <p className="text-xs text-neutral-500">Master Backup Generator</p>
              </div>

              <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800">
                  <label className="text-[10px] font-bold uppercase text-neutral-500 mb-2 block">Binge Cat Catalog URL</label>
                  <input type="text" value={bingeCatUrl} onChange={(e) => setBingeCatUrl(e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 rounded-lg p-3 text-xs text-white" placeholder="Paste your Binge Cat link here..." />
              </div>

              <div className="flex gap-2">
                <button onClick={downloadJson} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl text-xs">Download File</button>
                <button onClick={copyToClipboard} className="flex-1 bg-neutral-800 hover:bg-neutral-700 text-white font-bold py-4 rounded-xl text-xs">{copyStatus}</button>
              </div>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
