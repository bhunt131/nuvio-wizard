<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio Provisioning Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen p-6 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const baseUrl = window.location.origin;
            const [copyStatus, setCopyStatus] = useState('Copy URL');

            const copyToClipboard = (url) => {
                navigator.clipboard.writeText(url);
                setCopyStatus('Copied!');
                setTimeout(() => setCopyStatus('Copy URL'), 2000);
            };

            return (
                <div className="max-w-md mx-auto space-y-6">
                    <div className="text-center pb-2 border-b border-neutral-800">
                        <h1 className="text-xl font-black text-white uppercase tracking-tight">Nuvio Panel</h1>
                    </div>

                    {/* Instructions */}
                    <div className="bg-neutral-900 border border-neutral-800 p-5 rounded-xl text-[12px] text-neutral-400 space-y-2">
                        <p className="font-bold text-white uppercase tracking-wider mb-2">Instructions:</p>
                        <ol className="list-decimal ml-4 space-y-1">
                            <li>Choose the config type below.</li>
                            <li>Click <b>Copy URL</b>.</li>
                            <li>Go to <a href="https://aiostreams.elfhosted.com/stremio/configure" target="_blank" className="text-emerald-400 underline font-semibold">AIOStreams Config</a>.</li>
                            <li>Paste the link into the <b>Import Template</b> field.</li>
                        </ol>
                    </div>

                    {/* Links */}
                    <div className="space-y-3">
                        <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800 flex justify-between items-center">
                            <span className="text-[10px] text-neutral-500 font-mono truncate mr-2">Mobile Config</span>
                            <button onClick={() => copyToClipboard(`${baseUrl}/mobile-config.json`)} className="bg-indigo-900 hover:bg-indigo-800 px-4 py-2 rounded-lg text-[10px] font-bold text-white transition">Copy URL</button>
                        </div>
                        <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800 flex justify-between items-center">
                            <span className="text-[10px] text-neutral-500 font-mono truncate mr-2">Quality Config</span>
                            <button onClick={() => copyToClipboard(`${baseUrl}/quality-config.json`)} className="bg-emerald-900 hover:bg-emerald-800 px-4 py-2 rounded-lg text-[10px] font-bold text-white transition">Copy URL</button>
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
