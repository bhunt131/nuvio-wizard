<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio Provisioning Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const AVAILABLE_SCRAPERS = [
            { id: 'torrentio', name: 'Torrentio (Public Catalogs)' },
            { id: 'comet', name: 'Comet (High-Speed Scraper)' },
            { id: 'knightcrawler', name: 'KnightCrawler (P2P Index)' },
            { id: 'mediafusion', name: 'MediaFusion (Alternative Links)' }
        ];

        const QUALITY_OPTIONS = [
            { id: 'all', name: 'All Qualities', desc: 'No filters applied' },
            { id: '1080p_or_less', name: 'Max 1080p', desc: 'Best for mobile frames / data' },
            { id: '720p_or_less', name: 'Max 720p', desc: 'Saves maximum bandwidth' },
            { id: '4k_only', name: 'Strict 4K UHD', desc: 'Premium displays only' }
        ];

        function App() {
          const [bcInput, setBcInput] = useState('');
          const [engineType, setEngineType] = useState('public'); 
          const [customBaseUrl, setCustomBaseUrl] = useState('https://your-selfhosted-domain.com');
          const [selectedScrapers, setSelectedScrapers] = useState(['torrentio', 'comet']);
          const [maxQuality, setMaxQuality] = useState('all');
          const [isMobile, setIsMobile] = useState(false);
          const [loading, setLoading] = useState(false);
          const [results, setResults] = useState(null);
          const [copiedField, setCopiedField] = useState(null);

          const toggleScraper = (id) => {
            setSelectedScrapers(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
          };

          const copyToClipboard = (text, fieldName) => {
            navigator.clipboard.writeText(text);
            setCopiedField(fieldName);
            setTimeout(() => setCopiedField(null), 2000);
          };

          const handleFormSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            try {
                const response = await fetch('/api/compile-deployment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bingecatInput: bcInput, scrapers: selectedScrapers, engineType, customBaseUrl, maxQuality, isMobile })
                });
                const data = await response.json();
                if (data.success) setResults(data);
            } catch (err) { alert("Compilation failed: " + err.message); } 
            finally { setLoading(false); }
          };

          return (
            <div className="min-h-screen py-6 px-4 max-w-lg mx-auto">
              <div className="border-b border-neutral-800 pb-4 mb-5">
                <h1 className="text-lg font-black text-white tracking-tight">Nuvio Wizard</h1>
                <p className="text-[11px] text-neutral-400">Automated Stream Provisioning</p>
              </div>

              <form onSubmit={handleFormSubmit} className="space-y-4">
                <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800">
                  <label className="text-[10px] font-bold uppercase text-neutral-500 block mb-2">BingeCat UUID / Link</label>
                  <input type="text" required value={bcInput} onChange={(e) => setBcInput(e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 rounded-lg p-3 text-xs text-white" placeholder="Paste link..." />
                </div>

                <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800 space-y-3">
                  <div className="flex justify-between items-center">
                    <label className="text-[10px] font-bold uppercase text-neutral-500">Scraper Matrix</label>
                    <div className="flex bg-neutral-950 p-1 rounded-lg border border-neutral-800 text-[10px]">
                      <button type="button" onClick={() => setEngineType('public')} className={`px-2 py-1 rounded ${engineType === 'public' ? 'bg-indigo-600 text-white' : 'text-neutral-400'}`}>Public</button>
                      <button type="button" onClick={() => setEngineType('selfhosted')} className={`px-2 py-1 rounded ${engineType === 'selfhosted' ? 'bg-indigo-600 text-white' : 'text-neutral-400'}`}>Self-Hosted</button>
                    </div>
                  </div>
                  {engineType === 'selfhosted' && <input type="url" required value={customBaseUrl} onChange={(e) => setCustomBaseUrl(e.target.value)} className="w-full bg-neutral-950 border border-neutral-800 rounded-lg p-2.5 text-xs text-white" />}
                  {AVAILABLE_SCRAPERS.map(s => (
                    <div key={s.id} onClick={() => toggleScraper(s.id)} className={`p-3 rounded-lg border cursor-pointer text-xs flex justify-between items-center ${selectedScrapers.includes(s.id) ? 'bg-indigo-950/30 border-indigo-500 text-white' : 'bg-neutral-950 border-neutral-800 text-neutral-400'}`}>
                      {s.name}
                      {selectedScrapers.includes(s.id) && <span className="text-indigo-400 font-bold">✓</span>}
                    </div>
                  ))}
                </div>

                <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800 space-y-2">
                  <label className="text-[10px] font-bold uppercase text-neutral-500">Quality Filter</label>
                  {QUALITY_OPTIONS.map(opt => (
                    <div key={opt.id} onClick={() => setMaxQuality(opt.id)} className={`p-3 rounded-lg border cursor-pointer text-xs flex justify-between items-center ${maxQuality === opt.id ? 'bg-indigo-950/30 border-indigo-500 text-white' : 'bg-neutral-950 border-neutral-800 text-neutral-400'}`}>
                      {opt.name}
                      {maxQuality === opt.id && <span className="text-indigo-400 font-bold">●</span>}
                    </div>
                  ))}
                </div>

                <button type="submit" disabled={loading} className="w-full bg-indigo-600 font-bold py-3.5 rounded-xl text-xs text-white">{loading ? 'Compiling...' : 'Generate Manifests'}</button>
              </form>

              {results && (
                <div className="mt-5 space-y-3">
                  <div className="bg-neutral-900 border border-emerald-900/30 rounded-xl p-4">
                    <label className="text-[9px] text-emerald-400 uppercase font-bold mb-1 block">Catalog Interface</label>
                    <div className="flex gap-2">
                      <input readOnly value={results.bingecatManifest} className="bg-neutral-950 text-[10px] p-2 flex-grow font-mono text-neutral-400 rounded border border-neutral-800 truncate" />
                      <button onClick={() => copyToClipboard(results.bingecatManifest, 'bc')} className="bg-neutral-800 text-xs px-3 rounded text-white">{copiedField === 'bc' ? 'Copied' : 'Copy'}</button>
                    </div>
                  </div>
                  <div className="bg-neutral-900 border border-emerald-900/30 rounded-xl p-4">
                    <label className="text-[9px] text-emerald-400 uppercase font-bold mb-1 block">Scraper Array</label>
                    <div className="flex gap-2">
                      <input readOnly value={results.aiostreamsManifest} className="bg-neutral-950 text-[10px] p-2 flex-grow font-mono text-neutral-400 rounded border border-neutral-800 truncate" />
                      <button onClick={() => copyToClipboard(results.aiostreamsManifest, 'aio')} className="bg-neutral-800 text-xs px-3 rounded text-white">{copiedField === 'aio' ? 'Copied' : 'Copy'}</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
