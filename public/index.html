<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio Provisioning Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const AVAILABLE_SCRAPERS = [
            { id: 'torrentio', name: 'Torrentio (Public Catalogs)' },
            { id: 'comet', name: 'Comet (High-Speed Scraper)' },
            { id: 'knightcrawler', name: 'KnightCrawler (P2P Index)' },
            { id: 'mediafusion', name: 'MediaFusion (Alternative Links)' }
        ];

        const QUALITY_OPTIONS = [
            { id: 'all', name: 'All Qualities', desc: 'No filters applied' },
            { id: '1080p_or_less', name: 'Max 1080p', desc: 'Best for mobile / data' },
            { id: '720p_or_less', name: 'Max 720p', desc: 'Saves maximum bandwidth' },
            { id: '4k_only', name: 'Strict 4K UHD', desc: 'Premium displays only' }
        ];

        function App() {
          const [selectedScrapers, setSelectedScrapers] = useState(['torrentio', 'comet']);
          const [maxQuality, setMaxQuality] = useState('all');
          const [isMobile, setIsMobile] = useState(false);

          const toggleScraper = (id) => {
            setSelectedScrapers(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
          };

          const downloadTemplate = () => {
            const configData = {
                scrapers: selectedScrapers,
                options: {
                    cached_only: true,
                    max_results: 5,
                    resolution_filter: maxQuality !== 'all' ? maxQuality : undefined,
                    name_template: `[{stream.resolution}] • {stream.type::=debrid["☁️ Debrid"||"🌐 P2P"]} • {service.cached::istrue["⚡ Cached"||"⚪ Uncached"]} • {addon.name}`,
                    description_template: `🎥 {stream.quality} • 📦 {stream.size::rbytes} • 🗓️ {stream.year} • {stream.visualTags::join(' ')}`
                },
                meta: { mobile_optimized: isMobile, generated_at: new Date().toISOString() }
            };

            const blob = new Blob([JSON.stringify(configData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nuvio-config-${Date.now()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          };

          return (
            <div className="min-h-screen py-8 px-4 max-w-lg mx-auto">
              <div className="border-b border-neutral-800 pb-4 mb-6">
                <h1 className="text-xl font-black text-white">Nuvio Provisioning</h1>
                <p className="text-xs text-neutral-500">Local Template Generator</p>
              </div>

              <div className="space-y-6">
                {/* Scrapers */}
                <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800">
                    <label className="text-[10px] font-bold uppercase text-neutral-500 mb-3 block">Scraper Matrix</label>
                    <div className="space-y-2">
                        {AVAILABLE_SCRAPERS.map(s => (
                            <div key={s.id} onClick={() => toggleScraper(s.id)} className={`p-3 rounded-lg border cursor-pointer text-xs flex justify-between items-center ${selectedScrapers.includes(s.id) ? 'bg-indigo-950/30 border-indigo-500 text-white' : 'bg-neutral-950 border-neutral-800 text-neutral-400'}`}>
                                {s.name}
                                {selectedScrapers.includes(s.id) && <span className="text-indigo-400 font-bold">✓</span>}
                            </div>
                        ))}
                    </div>
                </div>

                {/* Quality */}
                <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800">
                    <label className="text-[10px] font-bold uppercase text-neutral-500 mb-3 block">Quality Filter</label>
                    <div className="space-y-2">
                        {QUALITY_OPTIONS.map(opt => (
                            <div key={opt.id} onClick={() => setMaxQuality(opt.id)} className={`p-3 rounded-lg border cursor-pointer text-xs flex justify-between items-center ${maxQuality === opt.id ? 'bg-indigo-950/30 border-indigo-500 text-white' : 'bg-neutral-950 border-neutral-800 text-neutral-400'}`}>
                                <span>{opt.name}</span>
                                {maxQuality === opt.id && <span className="text-indigo-400 font-bold">●</span>}
                            </div>
                        ))}
                    </div>
                </div>

                {/* Action */}
                <button onClick={downloadTemplate} className="w-full bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white font-bold py-4 rounded-xl text-xs transition shadow-lg shadow-emerald-900/20">
                    Download Configuration Template (.json)
                </button>
              </div>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
