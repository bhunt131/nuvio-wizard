<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio Provisioning Panel</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-4 md:p-8 font-sans antialiased selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [bingeCatUrl, setBingeCatUrl] = useState('');

            useEffect(() => {
                const savedUrl = localStorage.getItem('nuvio_binge_url') || '';
                setBingeCatUrl(savedUrl);
            }, []);

            const generateConfig = (type) => JSON.stringify({
                metadata: {
                    id: `nuvio-${type}-config`,
                    name: `Nuvio ${type.charAt(0).toUpperCase() + type.slice(1)} Preset`,
                    description: "Optimized Scraper & Filter settings for Nuvio",
                    author: "Nuvio"
                },
                config: {
                    bingecat_url: bingeCatUrl,
                    scrapers: ["torrentio", "comet", "knightcrawler", "mediafusion"],
                    options: {
                        cached_only: true,
                        max_results: type === 'mobile' ? 3 : 15,
                        resolution_filter: type === 'mobile' ? "1080p_or_less" : undefined,
                        name_template: "[{stream.resolution}] • {stream.type::=debrid[\"☁️ Debrid\"||\"🌐 P2P\"]} • {service.cached::istrue[\"⚡ Cached\"||\"⚪ Uncached\"]} • {addon.name}",
                        description_template: "🎥 {stream.quality} • 📦 {stream.size::rbytes} • 🗓️ {stream.year}"
                    }
                }
            }, null, 2);

            const download = (type) => {
                localStorage.setItem('nuvio_binge_url', bingeCatUrl);
                const blob = new Blob([generateConfig(type)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `nuvio-${type}-template.json`;
                a.click();
            };

            return (
                <div className="max-w-xl mx-auto space-y-8">
                    {/* Header */}
                    <div className="text-center pb-4">
                        <h1 className="text-3xl font-black text-white tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-emerald-400">
                            Nuvio Provisioning
                        </h1>
                        <p className="text-slate-400 text-sm mt-2">Automated setup for your media environment.</p>
                    </div>

                    {/* Step 1 */}
                    <div className="bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-lg relative">
                        <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500 rounded-l-2xl"></div>
                        <h2 className="text-lg font-bold text-white mb-2 flex items-center gap-2">
                            <span className="bg-indigo-500/20 text-indigo-400 rounded-full w-6 h-6 flex items-center justify-center text-xs">1</span>
                            Binge Cat Configuration
                        </h2>
                        <a href="https://bingecat.com/stremio/configure" target="_blank" className="inline-block mb-4 text-xs font-bold bg-slate-700 hover:bg-slate-600 text-white py-2 px-4 rounded-lg transition">
                            ↗ Open Binge Cat Configurator
                        </a>
                        <input 
                            type="text" 
                            value={bingeCatUrl} 
                            onChange={(e) => setBingeCatUrl(e.target.value)} 
                            className="w-full bg-slate-900 border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none rounded-xl p-3 text-sm text-white transition placeholder-slate-600"
                            placeholder="Paste Binge Cat URL here..." 
                        />
                    </div>

                    {/* Step 2 */}
                    <div className="bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-lg relative">
                        <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500 rounded-l-2xl"></div>
                        <h2 className="text-lg font-bold text-white mb-2 flex items-center gap-2">
                            <span className="bg-emerald-500/20 text-emerald-400 rounded-full w-6 h-6 flex items-center justify-center text-xs">2</span>
                            Select Preset
                        </h2>
                        <div className="grid sm:grid-cols-2 gap-4 mt-4">
                            <button onClick={() => download('mobile')} className="bg-slate-900 hover:bg-indigo-600 border border-slate-700 text-white p-4 rounded-xl transition">
                                <span className="font-bold block">📱 Mobile Profile</span>
                                <span className="text-[10px] text-slate-400">1080p limit • 3 results</span>
                            </button>
                            <button onClick={() => download('quality')} className="bg-slate-900 hover:bg-emerald-600 border border-slate-700 text-white p-4 rounded-xl transition">
                                <span className="font-bold block">📺 Home Theater</span>
                                <span className="text-[10px] text-slate-400">Unlimited • 15 results</span>
                            </button>
                        </div>
                    </div>

                    {/* Step 3 */}
                    <div className="bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-lg relative">
                        <div className="absolute top-0 left-0 w-1 h-full bg-amber-500 rounded-l-2xl"></div>
                        <h2 className="text-lg font-bold text-white mb-2 flex items-center gap-2">
                            <span className="bg-amber-500/20 text-amber-400 rounded-full w-6 h-6 flex items-center justify-center text-xs">3</span>
                            Finalize via AIOStreams
                        </h2>
                        <ol className="space-y-3 text-sm text-slate-300 ml-7 list-decimal">
                            <li>Visit the <a href="https://aiostreams.elfhosted.com/stremio/configure" target="_blank" className="text-amber-400 underline">AIOStreams Configurator</a>.</li>
                            <li>Click <strong>Import</strong> and upload your downloaded file.</li>
                            <li>Click <strong>Install</strong>. Your Nuvio backend handles authentication automatically.</li>
                        </ol>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
